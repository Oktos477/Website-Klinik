<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Daftar Pasien | KlinikQu</title>

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@500;700&display=swap"
        rel="stylesheet">

    <!-- Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />

    <style>
        :root {
            --primary: #0d9488;
            --primary-dark: #0f766e;
            --bg-gradient: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            --glass: rgba(255, 255, 255, 0.92);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
        }

        /* BACK BUTTON */
        .btn-back {
            position: fixed;
            top: 25px;
            left: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            background: white;
            padding: 12px 18px;
            border-radius: 50px;
            color: var(--primary-dark);
            font-weight: 600;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
            transition: 0.3s ease;
            z-index: 100;
        }

        .btn-back:hover {
            background: var(--primary);
            color: white;
            transform: translateX(-4px);
        }

        /* CARD */
        .main-card {
            width: 100%;
            max-width: 520px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 35px;
            padding: 45px 35px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.4);
            animation: fadeUp .7s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* FORM */
        .input-box {
            margin-bottom: 18px;
        }

        .input-box input {
            width: 100%;
            padding: 15px 18px;
            border: none;
            outline: none;
            border-radius: 16px;
            background: #f8fafc;
            border: 2px solid transparent;
            transition: 0.25s ease;
            font-size: 15px;
        }

        .input-box input:focus {
            background: white;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(13, 148, 136, 0.12);
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(to right, var(--primary), var(--primary-dark));
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.25s ease;
            margin-top: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(13, 148, 136, 0.25);
        }

        .btn-submit:disabled {
            opacity: .7;
            cursor: not-allowed;
        }

        /* ALERT */
        .alert {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 16px;
            border-radius: 16px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .alert-error {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }

        .alert-success {
            background: #ecfdf5;
            color: #059669;
            border: 1px solid #a7f3d0;
        }

        .hidden {
            display: none;
        }

        .link-text {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
        }

        .link-text:hover {
            text-decoration: underline;
        }

        @media(max-width:600px) {

            .main-card {
                padding: 35px 24px;
                border-radius: 28px;
            }

            .btn-back {
                top: 15px;
                left: 15px;
                padding: 10px 15px;
            }
        }
    </style>
</head>

<body>

    <!-- BACK -->
    <a href="index.html" class="btn-back">
        <i class="fas fa-arrow-left"></i>
        <span>Kembali</span>
    </a>

    <!-- CARD -->
    <div class="main-card">

        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-gray-800" style="font-family:'Oswald',sans-serif;">
                Daftar Pasien
            </h1>

            <p class="text-gray-500 mt-3">
                Buat akun baru untuk mengakses layanan KlinikQu
            </p>
        </div>

        <!-- ERROR -->
        <div id="errMsg" class="alert alert-error hidden">
            <i class="fas fa-circle-exclamation"></i>
            <span id="errText"></span>
        </div>

        <!-- SUCCESS -->
        <div id="successMsg" class="alert alert-success hidden">
            <i class="fas fa-circle-check"></i>
            <span id="successText"></span>
        </div>

        <!-- FORM -->
        <form id="signupForm">

            <div class="input-box">
                <input type="text" id="nama" placeholder="Nama Lengkap" required>
            </div>

            <div class="input-box">
                <input type="email" id="email" placeholder="Email" required>
            </div>

            <div class="input-box">
                <input type="tel" id="phone" placeholder="Nomor WhatsApp" required>
            </div>

            <div class="input-box">
                <input type="password" id="password" placeholder="Password" required>
            </div>

            <div class="input-box">
                <input type="password" id="confirmPassword" placeholder="Konfirmasi Password" required>
            </div>

            <button type="submit" class="btn-submit" id="btnSubmit">
                DAFTAR SEKARANG
            </button>

            <p class="text-center text-sm text-gray-500 mt-6">
                Sudah punya akun?
                <a href="login-karyawan.html" class="link-text">
                    Login di sini
                </a>
            </p>

        </form>
    </div>

    <script>

        // =========================================================
        // API URL
        // =========================================================

        const API_URL =
            'https://script.google.com/macros/s/AKfycbzedtDmLDaC1DxoQoh4MD2qTRjJI1bxeECEuBkVeTRTqJSiIK7kBq8Y9bKa4qeDlfKzIg/exec';


        // =========================================================
        // ELEMENTS
        // =========================================================

        const signupForm = document.getElementById('signupForm');
        const btnSubmit = document.getElementById('btnSubmit');

        const errMsg = document.getElementById('errMsg');
        const errText = document.getElementById('errText');

        const successMsg = document.getElementById('successMsg');
        const successText = document.getElementById('successText');


        // =========================================================
        // FORMAT TIMESTAMP WIB
        // HASIL:
        // 28-05-2026 09:17 WIB
        // =========================================================

        function getWIBTimestamp() {

            const now = new Date();

            const jakartaTime = new Date(
                now.toLocaleString('en-US', {
                    timeZone: 'Asia/Jakarta'
                })
            );

            const day = String(jakartaTime.getDate()).padStart(2, '0');
            const month = String(jakartaTime.getMonth() + 1).padStart(2, '0');
            const year = jakartaTime.getFullYear();

            const hour = String(jakartaTime.getHours()).padStart(2, '0');
            const minute = String(jakartaTime.getMinutes()).padStart(2, '0');

            return `${day}-${month}-${year} ${hour}:${minute} WIB`;
        }


        // =========================================================
        // ALERT FUNCTIONS
        // =========================================================

        function showError(message) {
            successMsg.classList.add('hidden');

            errText.textContent = message;
            errMsg.classList.remove('hidden');
        }

        function showSuccess(message) {
            errMsg.classList.add('hidden');

            successText.textContent = message;
            successMsg.classList.remove('hidden');
        }


        // =========================================================
        // LOADING BUTTON
        // =========================================================

        function setLoading(isLoading) {

            if (isLoading) {
                btnSubmit.disabled = true;
                btnSubmit.innerHTML = `
                    <i class="fas fa-spinner fa-spin"></i>
                    Memproses...
                `;
            } else {
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = 'DAFTAR SEKARANG';
            }
        }


        // =========================================================
        // SUBMIT
        // =========================================================

        signupForm.addEventListener('submit', async (e) => {

            e.preventDefault();

            errMsg.classList.add('hidden');
            successMsg.classList.add('hidden');

            const nama = document.getElementById('nama').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;


            // VALIDATION
            if (password !== confirmPassword) {
                showError('Password dan konfirmasi password tidak cocok.');
                return;
            }

            if (password.length < 6) {
                showError('Password minimal 6 karakter.');
                return;
            }


            // PAYLOAD
            const payload = {
                action: 'signup-pasien',
                nama,
                email,
                phone,
                password,

                // FORMAT AMAN
                timestamp: getWIBTimestamp()
            };


            setLoading(true);

            try {

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8'
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (data.success) {

                    showSuccess(
                        data.message ||
                        'Registrasi berhasil! Mengalihkan...'
                    );

                    // AUTO LOGIN
                    localStorage.setItem(
                        'klinikqu_user',
                        JSON.stringify(data.user)
                    );

                    setTimeout(() => {
                        window.location.href = 'appointment.html';
                    }, 2000);

                } else {

                    showError(
                        data.message ||
                        'Registrasi gagal.'
                    );

                    setLoading(false);
                }

            } catch (error) {

                console.error(error);

                showError(
                    'Gagal terhubung ke server Apps Script.'
                );

                setLoading(false);
            }
        });

    </script>

</body>

</html>
